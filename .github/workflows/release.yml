name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release artifact
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate semver tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "GITHUB_REF_NAME must match semver tag format (vMAJOR.MINOR.PATCH): ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-apple-darwin

      - name: Build grove release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package github release tarball
        env:
          GROVE_BINARY: "${{ github.workspace }}/target/aarch64-apple-darwin/release/grove"
          GROVE_DIST_DIR: "${{ github.workspace }}/dist"
        run: |
          bash scripts/package-release.sh

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ github.workspace }}/dist/grove-aarch64-apple-darwin.tar.gz"
          fail_on_unmatched_files: true
          generate_release_notes: true
